<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <meta property="og:title" content="DubDub22 - Next-Gen 3D Printed Suppressor" />
  <meta property="og:description"
    content="The DubDub22 is a groundbreaking 3D-printed 22LR suppressor. Featuring advanced pressure-release technology and unparalleled manufacturing innovation, it resets the standard for rimfire suppression." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="DubDub22" />
  <meta name="twitter:description"
    content="Experience the bleeding edge of suppressor design. The DubDub22 brings advanced pressure-release technology and revolutionary 3D-printing manufacturing to 22LR." />
  <meta name="twitter:image" content="/og-image.png" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <link rel="icon" type="image/png" href="/favicon.png?v=2" />
  <link rel="apple-touch-icon" href="/favicon.png?v=2" />
  <meta name="theme-color" content="#ff6600" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@500;600;700&display=swap"
    rel="stylesheet">

  <!-- Organization Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "@id": "https://dubdub22.com/#organization",
    "name": "Double T Tactical",
    "url": "https://dubdub22.com",
    "logo": "https://dubdub22.com/favicon.png",
    "description": "Double T Tactical manufactures the DubDub22, a groundbreaking 3D-printed 22LR suppressor featuring advanced pressure-release technology.",
    "foundingLocation": {
      "@type": "Place",
      "name": "Floresville, TX"
    },
    "contactPoint": {
      "@type": "ContactPoint",
      "email": "info@dubdub22.com",
      "url": "https://dubdub22.com/contact",
      "contactType": "customer service",
      "availableLanguage": "English"
    },
    "sameAs": [
      "https://www.instagram.com/dubdub22",
      "https://www.facebook.com/dubdub22",
      "https://www.youtube.com/@dubdub22"
    ]
  }
  </script>

  <!-- Product Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "DubDub22 Suppressor",
    "description": "A groundbreaking 3D-printed 22LR suppressor featuring advanced pressure-release technology and unparalleled manufacturing innovation.",
    "image": "https://dubdub22.com/og-image.png",
    "url": "https://dubdub22.com",
    "brand": {
      "@type": "Brand",
      "name": "DubDub22",
      "manufacturer": {
        "@id": "https://dubdub22.com/#organization"
      }
    },
    "manufacturer": {
      "@id": "https://dubdub22.com/#organization"
    },
    "category": "Firearm Suppressor",
    "offers": {
      "@type": "Offer",
      "url": "https://dubdub22.com/order",
      "availability": "https://schema.org/InStock",
      "priceCurrency": "USD",
      "description": "Available through authorized dealers. Contact us for pricing and dealer locator."
    },
    "additionalProperty": [
      {
        "@type": "PropertyValue",
        "name": "Caliber",
        "value": "22LR"
      },
      {
        "@type": "PropertyValue",
        "name": "Technology",
        "value": "3D Printed, Pressure-Release"
      }
    ]
  }
  </script>

  <!-- WebSite Schema with Search Box -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "@id": "https://dubdub22.com/#website",
    "url": "https://dubdub22.com",
    "name": "DubDub22 - Next-Gen 3D Printed Suppressor",
    "description": "The DubDub22 is a groundbreaking 3D-printed 22LR suppressor.",
    "publisher": {
      "@id": "https://dubdub22.com/#organization"
    },
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://dubdub22.com/dealers?search={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('SW registered: ', registration);
        }).catch(registrationError => {
          console.log('SW registration failed: ', registrationError);
        });
      });
    }
  </script>
</body>

</html>
